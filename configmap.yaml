apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-gateway-config
  labels:
    app: agent-gateway
# All values land in the container as environment variables (envFrom: configMapRef).
# Update + apply through the regular CD pipeline; Pods are rolling-restarted to
# pick up the new values, mirroring how ROUTE_REGISTRY / CRON_REGISTRY ship.
data:
  # ─────────────────────────────────────────────────────────────────
  # External data-source URLs (consumed by the earnings prompts)
  # ─────────────────────────────────────────────────────────────────
  # Primary source for financial results / statements (pre-earnings prompt
  # and the web-search branch of the ECTS prompt). The URL is a Python
  # str.format template; supported placeholders:
  #   {company}        — company name from the inbound message (optional)
  #   {ticker}         — ticker symbol (optional)
  #   {fiscal_year}    — e.g. 2026 (optional)
  #   {fiscal_quarter} — e.g. 1   (optional)
  STOCKTITAN_URL: "https://www.stocktitan.net/news/{ticker}"

  # Earnings-call transcript source used by the ECTS prompt when
  # WEB_SEARCH_FLAG=true. Same placeholder grammar as STOCKTITAN_URL.
  MOTLEYFOOL_URL: "https://www.fool.com/earnings/call-transcripts/"

  # ─────────────────────────────────────────────────────────────────
  # ECTS web-search switch
  # ─────────────────────────────────────────────────────────────────
  # When "true", the ECTS prompt instructs the agent to query the public
  # web (stocktitan for financial statements, motley fool for transcripts)
  # instead of relying solely on pre-fetched GCS inputs.
  # Toggle via CD: edit this ConfigMap, apply, rolling-restart the Pods.
  WEB_SEARCH_FLAG: "false"

  # ─────────────────────────────────────────────────────────────────
  # Optional fallbacks for the pre-earnings prompt
  # ─────────────────────────────────────────────────────────────────
  # Used only when the stocktitan lookup is unsuccessful. Either or both
  # may be left blank — the pre-earnings prompt will simply omit the
  # corresponding fallback instruction.
  COMPANY_IR_URL: ""
  COMPANY_TOPIC: ""

  # ─────────────────────────────────────────────────────────────────
  # Existing runtime configuration (kept here so a single ConfigMap
  # owns every value the Gateway reads from the environment).
  # ─────────────────────────────────────────────────────────────────
  DEFAULT_LLM_MODEL: "claude-sonnet-4-20250514"
  DEFAULT_LLM_MAX_TOKENS: "4096"
  AGENT_MAX_ITERATIONS: "10"
  WORKSPACE_TMP_DIR: "/tmp/workspace"
  CRON_SCHEDULER_ENABLED: "true"
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
