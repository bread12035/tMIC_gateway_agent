steps:
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - "${_IMAGE}:${SHORT_SHA}"
      - -t
      - "${_IMAGE}:latest"
      - --build-arg
      - "GATEWAY_VERSION=${SHORT_SHA}"
      - .
  - name: gcr.io/cloud-builders/docker
    id: push-sha
    args: ["push", "${_IMAGE}:${SHORT_SHA}"]
  - name: gcr.io/cloud-builders/docker
    id: push-latest
    args: ["push", "${_IMAGE}:latest"]

substitutions:
  _IMAGE: gcr.io/${PROJECT_ID}/agent-gateway

options:
  logging: CLOUD_LOGGING_ONLY
